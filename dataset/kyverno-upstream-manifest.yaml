# Curated mapping from kyverno/policies → benchmark IDs.
# Run:  python3 scripts/sync_kyverno_policies.py
#
# Bump `ref` when you intentionally refresh the corpus (document in commit message).

repository: https://github.com/kyverno/policies.git
# Pinned commit on kyverno/policies main (reproducible sync). Update when refreshing.
ref: 75a68932d86a67eea055089ec18311284877d296

# Relative to repo root
dest_policies: dataset/imported/kyverno-policies
dest_tests: dataset/imported/kyverno-tests
cache_dir: dataset/.cache/kyverno-policies-archive

policies:

  # =====================================================================
  # ValidatingPolicy (cpol → vpol) — 18 tasks
  # =====================================================================

  # Easy (6)
  - id: cp_require_labels
    upstream_path: best-practices/require-labels/require-labels.yaml
    sync_test: true

  - id: cp_require_resource_limits
    upstream_path: best-practices/require-pod-requests-limits/require-pod-requests-limits.yaml
    sync_test: true

  - id: cp_restrict_image_registries
    upstream_path: best-practices/restrict-image-registries/restrict-image-registries.yaml
    sync_test: true

  - id: cp_require_ro_rootfs
    upstream_path: best-practices/require-ro-rootfs/require-ro-rootfs.yaml
    sync_test: true

  - id: cp_restrict_nodeport
    upstream_path: best-practices/restrict-node-port/restrict-node-port.yaml
    sync_test: true

  - id: cp_disallow_latest_tag
    upstream_path: best-practices/disallow-latest-tag/disallow-latest-tag.yaml
    sync_test: true

  # Medium (6)
  - id: cp_disallow_default_namespace
    upstream_path: best-practices/disallow-default-namespace/disallow-default-namespace.yaml
    sync_test: true

  - id: cp_require_drop_all
    upstream_path: best-practices/require-drop-all/require-drop-all.yaml
    sync_test: true

  - id: cp_restrict_capabilities
    upstream_path: psp-migration/restrict-adding-capabilities/restrict-adding-capabilities.yaml
    sync_test: true

  - id: cp_require_probes
    upstream_path: best-practices/require-probes/require-probes.yaml
    sync_test: true

  - id: cp_disallow_privileged
    upstream_path: pod-security/baseline/disallow-privileged-containers/disallow-privileged-containers.yaml
    sync_test: true

  - id: cp_disallow_host_namespaces
    upstream_path: pod-security/baseline/disallow-host-namespaces/disallow-host-namespaces.yaml
    sync_test: true

  # Hard (6)
  - id: cp_disallow_cri_sock_mount
    upstream_path: best-practices/disallow-cri-sock-mount/disallow-cri-sock-mount.yaml
    sync_test: true

  - id: cp_enforce_resources_as_ratio
    upstream_path: other/enforce-resources-as-ratio/enforce-resources-as-ratio.yaml
    sync_test: true

  - id: cp_restrict_ingress_host
    upstream_path: other/restrict-ingress-host/restrict-ingress-host.yaml
    sync_test: true

  - id: cp_require_pdb
    upstream_path: other/require-pdb/require-pdb.yaml
    sync_test: true

  - id: cp_pdb_minavailable
    upstream_path: other/pdb-minavailable/pdb-minavailable.yaml
    sync_test: true

  - id: cp_block_stale_images
    upstream_path: other/block-stale-images/block-stale-images.yaml
    sync_test: true

  - id: cp_check_nvidia_gpu
    upstream_path: other/check-nvidia-gpu/check-nvidia-gpu.yaml
    sync_test: true

  - id: cp_limit_configmap_for_sa
    upstream_path: other/limit-configmap-for-sa/limit-configmap-for-sa.yaml
    sync_test: true

  # =====================================================================
  # MutatingPolicy (cpol → mpol) — 8 tasks
  # =====================================================================

  # Easy (3)
  - id: cp_add_default_labels
    upstream_path: other/add-labels/add-labels.yaml
    sync_test: true

  - id: cp_add_safe_to_evict
    upstream_path: best-practices/add-safe-to-evict/add-safe-to-evict.yaml
    sync_test: true

  - id: cp_add_default_resources
    upstream_path: other/add-default-resources/add-default-resources.yaml
    sync_test: true

  # Medium (3)
  - id: cp_add_tolerations
    upstream_path: other/add-tolerations/add-tolerations.yaml
    sync_test: true

  - id: cp_add_ndots
    upstream_path: other/add-ndots/add-ndots.yaml
    sync_test: true

  - id: cp_always_pull_images
    upstream_path: other/always-pull-images/always-pull-images.yaml
    sync_test: true

  # Hard (2)
  - id: cp_add_securitycontext
    upstream_path: other/add-default-securitycontext/add-default-securitycontext.yaml
    sync_test: true

  - id: cp_inject_sidecar
    upstream_path: other/inject-sidecar-deployment/inject-sidecar-deployment.yaml
    sync_test: true

  # =====================================================================
  # GeneratingPolicy (cpol → gpol) — 4 tasks
  # =====================================================================

  # Easy (1)
  - id: cp_add_ns_quota
    upstream_path: best-practices/add-ns-quota/add-ns-quota.yaml
    sync_test: true

  # Medium (2)
  - id: cp_create_default_pdb
    upstream_path: other/create-default-pdb/create-default-pdb.yaml
    sync_test: true

  - id: cp_kasten_generate_backup
    upstream_path: kasten/kasten-generate-example-backup-policy/kasten-generate-example-backup-policy.yaml
    sync_test: true

  # Hard (1)
  - id: cp_kasten_generate_by_label
    upstream_path: kasten/kasten-generate-policy-by-preset-label/kasten-generate-policy-by-preset-label.yaml
    sync_test: true

  # =====================================================================
  # Generation tasks — upstream tests reused as functional verification
  # for natural-language → policy generation. The dataset entries with
  # task_type=generate point at these test directories so the LLM is
  # asked to author a policy whose behavior matches what the upstream
  # test fixtures verify.
  # =====================================================================

  - id: gen_create_networkpolicy
    upstream_path: best-practices-gpol/add-network-policy/add-network-policy.yaml
    sync_test: true

  - id: gen_disallow_host_path
    upstream_path: pod-security/baseline/disallow-host-path/disallow-host-path.yaml
    sync_test: true

  - id: gen_disallow_capabilities
    upstream_path: pod-security/baseline/disallow-capabilities/disallow-capabilities.yaml
    sync_test: true

  # =====================================================================
  # Native ValidatingPolicy sources — for generate_test benchmark tasks.
  # These are already in the new policies.kyverno.io/v1 format, so the
  # test-gen benchmark can measure generation against a modern policy kind.
  # =====================================================================

  - id: vpol_block_ephemeral_containers
    upstream_path: other-vpol/block-ephemeral-containers/block-ephemeral-containers.yaml
    sync_test: true
