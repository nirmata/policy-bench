# Legacy Kyverno ClusterPolicy (apiVersion: kyverno.io/v1)
# Complex example: multiple rules, match/exclude, preconditions, mixed validations
# Conversion target: Kyverno 1.16+ ValidatingPolicy
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: complex-pod-and-deployment-policy
  annotations:
    policies.kyverno.io/title: Complex Pod and Deployment Standards
    policies.kyverno.io/category: Best Practices, Security
    policies.kyverno.io/description: Enforces resource limits, security context, labels, and deployment standards.
spec:
  validationFailureAction: Enforce
  background: true
  failurePolicy: Fail
  rules:
    # Rule 1: Require CPU and memory limits on all containers
    - name: require-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - default
                - production
          - resources:
              kinds:
                - Deployment
              selector:
                matchLabels:
                  app.kubernetes.io/part-of: platform
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
      validate:
        message: "Containers must have both CPU and memory limits set."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"

    # Rule 2: Require resource requests (at least as restrictive as limits)
    - name: require-resource-requests
      match:
        all:
          - resources:
              kinds:
                - Pod
          - resources:
              namespaces:
                - production
      preconditions:
        any:
          - key: "{{ request.operation }}"
            operator: In
            value:
              - CREATE
              - UPDATE
      validate:
        message: "Production Pods must have CPU and memory requests."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"

    # Rule 3: Disallow privileged containers
    - name: disallow-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
      validate:
        message: "Privileged mode is not allowed."
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(privileged): false

    # Rule 4: Require runAsNonRoot when possible
    - name: require-non-root
      match:
        resources:
          kinds:
            - Pod
      preconditions:
        all:
          - key: "{{ request.object.spec.securityContext }}"
            operator: NotEquals
            value: ""
      validate:
        message: "Pods should run as non-root (runAsNonRoot: true)."
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: true

    # Rule 5: Require app labels on Deployments in app namespaces
    - name: require-app-labels
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaces:
                - apps
                - staging
      validate:
        message: "Deployments must have app.kubernetes.io/name and app.kubernetes.io/version labels."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
              app.kubernetes.io/version: "?*"

    # Rule 6: Deny hostNetwork (disallow host network namespace)
    - name: disallow-host-network
      match:
        resources:
          kinds:
            - Pod
      validate:
        message: "Pods must not use hostNetwork."
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.hostNetwork }}"
                operator: Equals
                value: true

    # Rule 7: Audit rule - warn on missing readiness probe (background only)
    - name: warn-missing-readiness-probe
      match:
        resources:
          kinds:
            - Pod
      validate:
        message: "Consider adding a readinessProbe for production workloads."
        pattern:
          spec:
            containers:
              - =(readinessProbe): "?*"
      # In a real policy you might use a separate ClusterPolicy with validationFailureAction: Audit
      # Here we keep it as a single policy for complexity demonstration
---

