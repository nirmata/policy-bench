# Kyverno CLI test for the converted policy (output/converted.yaml).
# The results.policy name must match the converted policy's metadata.name.
# nctl conversion uses name "require-cpu-memory-limits"; adjust if you use a different converter.
# See: https://kyverno.io/docs/kyverno-cli/usage/test/
apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-resource-limits-test
policies:
  - ../output/converted.yaml
resources:
  - resources.yaml
results:
  - policy: require-cpu-memory-limits
    rule: ""
    resources:
      - pod-with-limits
    kind: Pod
    result: pass
  - policy: require-cpu-memory-limits
    rule: ""
    resources:
      - pod-without-limits
    kind: Pod
    result: fail
