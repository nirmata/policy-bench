apiVersion: cli.kyverno.io/v1alpha1
kind: Context
metadata:
  name: context
spec:
  resources:
    - apiVersion: policy/v1
      kind: PodDisruptionBudget
      metadata:
        name: nginx-pdb
        namespace: default
      spec:
        minAvailable: 1
        selector:
          matchLabels:
            app: nginx
