name: Deploy Dashboard

on:
  push:
    branches: [master]
    paths:
      - 'results/benchmark_latest.json'
      - 'reports/generate.py'
      - 'reports/templates/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        run: python3 reports/generate.py --format html

      - name: Capture dashboard screenshot
        run: |
          npm install puppeteer
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            await page.goto('file://${GITHUB_WORKSPACE}/reports/output/dashboard.html', { waitUntil: 'networkidle0' });
            await page.screenshot({ path: 'docs/dashboard-preview.png', fullPage: false });
            await browser.close();
          })();
          "

      - name: Create PR for screenshot update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard-preview.png
          if git diff --cached --quiet; then
            echo "No screenshot changes, skipping PR"
          else
            BRANCH="ci/update-dashboard-preview-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "docs: update dashboard preview screenshot"
            git push origin "$BRANCH"
            gh pr create \
              --title "docs: update dashboard preview screenshot" \
              --body "Auto-generated by CI — updates \`docs/dashboard-preview.png\` to match the latest deployed dashboard." \
              --base master \
              --head "$BRANCH"
            echo "PR created — merge manually when ready"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare pages artifact
        run: |
          mkdir -p _site
          cp reports/output/dashboard.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
